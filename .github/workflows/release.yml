name: Build & Release

# Tetikleyiciler (commit mesajına göre):
#   [release]    → yama sürümü artar  (1.0.0 → 1.0.1 → 1.0.2 …)
#   [version]    → ana sürüm artar    (1.x.x → 2.0.0)
#   [minor]      → ara sürüm artar    (1.0.x → 1.1.0)   (bonus)
#   [republish]  → SÜRÜM ARTMAZ; mevcut (son) sürümü yeniden derleyip
#                  o release'in dosyalarını günceller. Not: sürüm aynı kaldığı
#                  için zaten o sürümü kurmuş kullanıcılar OTOMATİK GÜNCELLEME ALMAZ
#                  (auto-update sürüm numarasına bakar). Yeni indirenler güncel dosyayı alır.
# Elle çalıştırmada (workflow_dispatch) artış türünü seçebilirsin.
on:
  push:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      bump:
        description: "Sürüm artışı türü"
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write

jobs:
  # 1) Sürümü artır, commit'le, etiketle (yalnızca bir kez çalışır)
  version:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[release]') ||
      contains(github.event.head_commit.message, '[version]') ||
      contains(github.event.head_commit.message, '[minor]') ||
      contains(github.event.head_commit.message, '[republish]')
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.bump.outputs.ref }}
    steps:
      - name: Kaynağı al
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Mod ve artış türünü belirle
        id: kind
        run: |
          MSG=$(git log -1 --pretty=%B)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="bump"; KIND="${{ github.event.inputs.bump }}"
          elif echo "$MSG" | grep -q "\[republish\]" && ! echo "$MSG" | grep -qE "\[release\]|\[version\]|\[minor\]"; then
            MODE="republish"; KIND="none"
          elif echo "$MSG" | grep -q "\[version\]"; then
            MODE="bump"; KIND="major"
          elif echo "$MSG" | grep -q "\[minor\]"; then
            MODE="bump"; KIND="minor"
          else
            MODE="bump"; KIND="patch"
          fi
          echo "Mod: $MODE / Artış: $KIND"
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "kind=$KIND" >> "$GITHUB_OUTPUT"

      - name: Sürümü belirle (artır veya mevcut sürüme yeniden yayımla)
        id: bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ "${{ steps.kind.outputs.mode }}" = "republish" ]; then
            CUR="v$(node -p "require('./package.json').version")"
            echo "Yeniden yayım: sürüm artmadan $CUR release'i güncellenecek."
            # Etiketi yeni koda taşı (release sayfasındaki kaynak kod yeni commit'i göstersin)
            git tag -f "$CUR"
            git push -f origin "$CUR" || true
            # Derleme bu commit'ten yapılsın (yeni kod)
            echo "ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            # Tabanı, package.json ile mevcut en yüksek git etiketinin büyüğü olarak al.
            # (Geçmiş bölünmesi/kopmuş etiket nedeniyle package.json geride kalsa bile
            #  sürüm hep en yüksek yayımlanmış sürümün üstüne çıkar → çakışma olmaz.)
            PKG=$(node -p "require('./package.json').version")
            TAGMAX=$(git tag -l 'v*' | sed 's/^v//' | sort -V | tail -1)
            TAGMAX=${TAGMAX:-0.0.0}
            BASE=$(printf '%s\n%s\n' "$PKG" "$TAGMAX" | sort -V | tail -1)
            echo "package.json=$PKG  en yüksek etiket=$TAGMAX  taban=$BASE"
            npm version "$BASE" --no-git-tag-version --allow-same-version >/dev/null
            NEW=$(npm version ${{ steps.kind.outputs.kind }} --no-git-tag-version)
            # Hesaplanan etiket yine de varsa (yerel/uzak), boş bir numara bulana dek artır.
            git fetch --tags --force origin || true
            while git rev-parse "$NEW" >/dev/null 2>&1; do
              echo "$NEW etiketi mevcut, atlanıyor."
              NEW=$(npm version patch --no-git-tag-version)
            done
            echo "Yeni sürüm: $NEW"
            # [skip ci] → bu otomatik commit yeni bir derlemeyi tetiklemesin (sonsuz döngü engeli)
            git commit -am "chore: release $NEW [skip ci]"
            git tag "$NEW"
            # Push öncesi rebase: bu sırada dalın başına gelen commit'lerle bölünmeyi önle.
            BR=$(git rev-parse --abbrev-ref HEAD)
            git pull --rebase origin "$BR" || true
            git push origin "HEAD:$BR"
            git push origin "$NEW"
            echo "ref=$NEW" >> "$GITHUB_OUTPUT"
          fi

  # 2) Belirlenen sürümden/commit'ten 3 platformda derle ve release'e yükle
  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    # secrets, adım "if" koşullarında kullanılamaz; bu yüzden sertifikanın
    # varlığını job-level env'e koyup if'lerde env üzerinden kontrol ediyoruz.
    env:
      HAS_MAC_CERT: ${{ secrets.MAC_CSC_LINK != '' }}
    steps:
      - name: Derlenecek sürümü/commit'i al
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.ref }}

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Bağımlılıkları yükle
        run: npm ci

      # Linux: .rpm üretimi için rpmbuild gerekir (.deb için gereken dpkg/fakeroot zaten var)
      - name: Linux paket araçları (rpm)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y rpm

      # macOS: sertifika gizli anahtarı VARSA imzalama ortamını hazırla.
      # (Değişkenleri boş string '' ile tanımlamak electron-builder'ı bozuyordu;
      #  bu yüzden yalnızca gerçek değer varken $GITHUB_ENV'e yazıyoruz.)
      - name: macOS imzalama değişkenleri
        if: matrix.os == 'macos-latest' && env.HAS_MAC_CERT == 'true'
        run: |
          {
            echo "CSC_LINK=${{ secrets.MAC_CSC_LINK }}"
            echo "CSC_KEY_PASSWORD=${{ secrets.MAC_CSC_KEY_PASSWORD }}"
            echo "APPLE_ID=${{ secrets.APPLE_ID }}"
            echo "APPLE_APP_SPECIFIC_PASSWORD=${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}"
          } >> "$GITHUB_ENV"

      # macOS: sertifika yoksa imzalamayı tamamen kapat (notarization da atlanır)
      - name: macOS imzasız mod
        if: matrix.os == 'macos-latest' && env.HAS_MAC_CERT != 'true'
        run: echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"

      - name: Derle ve release'e yükle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --publish always
