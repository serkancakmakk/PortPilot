name: Build & Release

# Tetikleyiciler (commit mesajına göre):
#   [release]  → yama sürümü artar  (1.0.0 → 1.0.1 → 1.0.2 …)
#   [version]  → ana sürüm artar    (1.x.x → 2.0.0)
#   [minor]    → ara sürüm artar    (1.0.x → 1.1.0)   (bonus)
# Elle çalıştırmada (workflow_dispatch) artış türünü seçebilirsin.
on:
  push:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      bump:
        description: "Sürüm artışı türü"
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write

jobs:
  # 1) Sürümü artır, commit'le, etiketle (yalnızca bir kez çalışır)
  version:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[release]') ||
      contains(github.event.head_commit.message, '[version]') ||
      contains(github.event.head_commit.message, '[minor]')
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - name: Kaynağı al
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Artış türünü belirle
        id: kind
        run: |
          MSG=$(git log -1 --pretty=%B)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            KIND="${{ github.event.inputs.bump }}"
          elif echo "$MSG" | grep -q "\[version\]"; then
            KIND="major"
          elif echo "$MSG" | grep -q "\[minor\]"; then
            KIND="minor"
          else
            KIND="patch"
          fi
          echo "Seçilen artış: $KIND"
          echo "kind=$KIND" >> "$GITHUB_OUTPUT"

      - name: Sürümü artır + commit + etiket
        id: bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          NEW=$(npm version ${{ steps.kind.outputs.kind }} --no-git-tag-version)
          echo "Yeni sürüm: $NEW"
          # [skip ci] → bu otomatik commit yeni bir derlemeyi tetiklemesin (sonsuz döngü engeli)
          git commit -am "chore: release $NEW [skip ci]"
          git tag "$NEW"
          git push
          git push --tags
          echo "tag=$NEW" >> "$GITHUB_OUTPUT"

  # 2) Yeni etiketten 3 platformda derle ve release'e yükle
  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    # secrets, adım "if" koşullarında kullanılamaz; bu yüzden sertifikanın
    # varlığını job-level env'e koyup if'lerde env üzerinden kontrol ediyoruz.
    env:
      HAS_MAC_CERT: ${{ secrets.MAC_CSC_LINK != '' }}
    steps:
      - name: Yeni sürümü (etiketi) al
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Bağımlılıkları yükle
        run: npm ci

      # macOS: sertifika gizli anahtarı VARSA imzalama ortamını hazırla.
      # (Değişkenleri boş string '' ile tanımlamak electron-builder'ı bozuyordu;
      #  bu yüzden yalnızca gerçek değer varken $GITHUB_ENV'e yazıyoruz.)
      - name: macOS imzalama değişkenleri
        if: matrix.os == 'macos-latest' && env.HAS_MAC_CERT == 'true'
        run: |
          {
            echo "CSC_LINK=${{ secrets.MAC_CSC_LINK }}"
            echo "CSC_KEY_PASSWORD=${{ secrets.MAC_CSC_KEY_PASSWORD }}"
            echo "APPLE_ID=${{ secrets.APPLE_ID }}"
            echo "APPLE_APP_SPECIFIC_PASSWORD=${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}"
          } >> "$GITHUB_ENV"

      # macOS: sertifika yoksa imzalamayı tamamen kapat (notarization da atlanır)
      - name: macOS imzasız mod
        if: matrix.os == 'macos-latest' && env.HAS_MAC_CERT != 'true'
        run: echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"

      - name: Derle ve release'e yükle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --publish always
